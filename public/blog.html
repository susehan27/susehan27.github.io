<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js" integrity="sha384-smHYKdLADwkXOn1EmN1qk/HfnUcbVRZyYmZ4qpPea6sjB/pTJ0euyQp0Mk8ck+5T" crossorigin="anonymous"></script>

</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col" id="header">
                <nav class="nav nav-justified">
                <a class="nav-link active" href="index.html">SUSANNA HAN</a>
                <a class="nav-link" href="blog.html">blog</a>
                <a class="nav-link" href="projects.html">projects</a>
                <a class="nav-link" href="about.html">about</a>
                </nav>
            </div>
        </div>
        <div class="jumbotron jumbotron-fluid">
            <div class="container">
                <div class="row">
                    <div class="col">
                        <p class="title" id="blogTitle">CODING 101</p>
                        <p id="plus"><button type="button" id="addBlog" data-toggle="modal" data-target="#exampleModalLong"><i class="fas fa-plus btn btn-dark"></i></button></p>
                        
                    </div>
                </div>
                <div class="row" id="blogs">
                    <div class="col-sm-6 cards">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">blog #1</h5>
                                <p class="card-text">coming soon!</p>
                                <button href="#" class="btn btn-dark">read</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 cards">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">blog #2</h5>
                                <p class="card-text">coming soon!</p>
                                <button href="#" class="btn btn-dark">read</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="exampleModalLong" tabindex="-1" role="dialog" aria-labelledby="exampleModalLongTitle" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLongTitle">CREATE A NEW BLOG POST</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="form-group">
                            <label for="example">Title: </label>
                            <input id="blogTitle" class="form-control" type="text" placeholder="a name for the blog.." required>
                        </div>
                        <div class="form-group">
                            <label>Content: </label>
                            <textarea class="form-control" id="blogContent" rows="10" required></textarea>
                        </div>
                        <div class="form-group">
                            <div class="input-group mb-3">
                                <div class="input-group-prepend">
                                    <span class="input-group-text" id="fileUpload">Upload</span>
                                </div>
                                <div class="custom-file">
                                    <input type="file" class="custom-file-input" id="file" aria-describedby="inputGroupFileAddon01">
                                    <label class="custom-file-label" for="inputGroupFile01">Choose file</label>
                                </div>
                            </div> 
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button id="postBlog" type="button" class="btn btn-primary" data-dismiss="modal">Post</button>
                </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            $(".modal").hide();
        });

        $("#addBlog").on("click", function() {
            $(".modal").show();
        });
        
        $("#fileUpload").on("click", function() {
            var file = $("#file").val().trim();
            $("<p>").append(file);

            $("#blogContent").append(file);
        });

        $("#postBlog").on("click", function() {
            var title = $("#blogTitle").val().trim();
            var content = $("#blogContent").val().trim();

            function makeBlog() {
                var newBlog = $('<div class="col-sm-6 cards"><div class="card"><div class="card-body"><h5 class="card-title"></h5><p class="card-text"></p><button href="#" class="btn btn-dark">read</button></div></div></div>"');
                newBlog.append()
            }
            

            $("#blogs").append(newBlog);

            $(".modal").hide();

        });
    </script>
</body>
</html>
